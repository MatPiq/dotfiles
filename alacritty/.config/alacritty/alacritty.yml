# Gruvbox-material
env:
  TERM: xterm-256color

# Gruvbox Material
# colors:
#   primary:
#     background: '0x32302f'
#     foreground: '0xd4be98'
#   normal:
#     black:   '0x45403d'
#     red:     '0xea6962'
#     green:   '0xa9b665'
#     yellow:  '0xd8a657'
#     blue:    '0x7daea3'
#     magenta: '0xd3869b'
#     cyan:    '0x89b482'
#     white:   '0xd4be98'
#   bright:
#     black:   '0x45403d'
#     red:     '0xea6962'
#     green:   '0xa9b665'
#     yellow:  '0xd8a657'
#     blue:    '0x7daea3'
#     magenta: '0xd3869b'
#     cyan:    '0x89b482'
#     white:   '0xd4be98'

# Material darker
colors:
  # Default colors
  primary:
    background: '0x212121'
    foreground: '0xeeffff'

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: '0x212121'
    cursor: '0xeeffff'

  # Normal colors
  normal:
    black:   '0x212121'
    red:     '0xf07178'
    green:   '0xc3e88d'
    yellow:  '0xffcb6b'
    blue:    '0x82aaff'
    magenta: '0xc792ea'
    cyan:    '0x89ddff'
    white:   '0xeeffff'

  # Bright colors
  bright:
    black:   '0x4a4a4a'
    red:     '0xf78c6c'
    green:   '0x303030'
    yellow:  '0x353535'
    blue:    '0xb2ccd6'
    magenta: '0xeeffff'
    cyan:    '0xff5370'
    white:   '0xffffff'

font:
  # Normal (roman) font face
  normal:
    family: MonoLisa Nerd Font
    style: Light
  # Bold font face
  bold:
    family: MonoLisa Nerd Font
    style: Book

  # Italic font face
  italic:
    family: MonoLisa Nerd Font

    # The `style` can be specified to pick a specific face.
    style: Light Italic

  # Bold italic font face
  bold_italic:
    # family: VictorMono Nerd Font
    family: MonoLisa Nerd Font
    # The `style` can be specified to pick a specific face.
    style: Book Italic
  size: 13.0
  offset:
    y: 4

alt_send_esc: false

window:
  dynamic_padding: true
  decorations: buttonless
  opacity: 1
  padding:
    y: 5
    x: 5

shell:
  program: /opt/homebrew/bin/fish
